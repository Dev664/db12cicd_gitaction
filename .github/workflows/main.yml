name: CI/CD Pipeline

on:
workflow_dispatch:

env:
IMAGE_NAME: doc201/flask-app

jobs:
build-deploy:
runs-on: self-hosted

```
steps:
  - name: Checkout Source Code
    uses: actions/checkout@v4

  - name: Generate Image Tag
    run: echo "TAG=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

  - name: Docker Login
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Docker Image
    run: |
      docker build -t $IMAGE_NAME:$TAG .
      docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest

  - name: Push Docker Image
    run: |
      docker push $IMAGE_NAME:$TAG
      docker push $IMAGE_NAME:latest

  - name: Verify Kubernetes Cluster
    run: |
      kubectl get nodes

  - name: Deploy Application
    run: |
      echo "Applying Kubernetes manifests..."

      kubectl apply -f deployment.yaml
      kubectl apply -f service.yaml

      echo "Updating deployment image..."

      kubectl set image deployment/flask-deployment \
      flask=$IMAGE_NAME:$TAG

  - name: Wait For Rollout
    run: |
      kubectl rollout status deployment/flask-deployment --timeout=300s

  - name: Verify Deployment
    run: |
      echo "===== Deployments ====="
      kubectl get deployment

      echo "===== Pods ====="
      kubectl get pods -o wide

      echo "===== Services ====="
      kubectl get svc

      echo "===== Images ====="
      kubectl describe deployment flask-deployment | grep Image
```
